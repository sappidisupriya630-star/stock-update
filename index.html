<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    📦 Smart Inventory System
</header>

<div class="main">

    <!-- Add Product -->
    <div class="card">
        <h2>Add Product</h2>

        <input type="text" id="productName" placeholder="Product Name" oninput="showImage()">

        <input type="number" id="productQty" value="1" min="1">

        <img id="previewImg" class="preview">

        <button class="main-btn" onclick="addProduct()">Add Product</button>
    </div>

    <!-- Sell Product -->
    <div class="card">
        <h2>Sell Product</h2>

        <input type="text" id="sellName" placeholder="Product Name">

        <input type="number" id="sellQty" value="1" min="1">

        <button class="main-btn" onclick="sellProduct()">Sell</button>
    </div>

    <!-- Inventory -->
    <div class="card">
        <h2>Inventory</h2>

        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
